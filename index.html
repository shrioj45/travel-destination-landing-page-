    <style>
        :root{
            --card-bg: rgba(255,255,255,0.06);
            --caption-color: #fff;
        }
        *{box-sizing: border-box;}
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('https://t3.ftcdn.net/jpg/04/10/86/00/240_F_410860050_KFa8KFnP2akFzOT7DjokBmf7rHChroh2.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #fff;
        }

        .main-title {
            font-size: clamp(1.6rem, 5vw, 4rem);65465465
            text-align: center;
            font-weight: 800;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            margin: 24px 12px;
            letter-spacing: 2px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
            padding: 12px;
        }

        .mountain-img-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.35);
            transition: transform .25s ease, box-shadow .25s ease;
            flex: 1 1 300px;      
            max-width: 400px;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mountain-img-container:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 30px rgba(0,0,0,0.45);
        }

        .mountain-img-container img {
            width: 100%;
            height: auto;
            display: block;
            border: 4px solid rgba(0,0,0,0.65);
            border-radius: 8px;
        }

        .caption {
            margin-top: 10px;
            color: var(--caption-color);
            font-weight: 600;
            font-size: 1.05rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            .mountain-img-container { flex: 1 1 95%; max-width: 95%; }
            .caption { font-size: 1rem; }
        }

        @media (min-width: 601px) and (max-width: 900px) {
            .mountain-img-container { flex: 1 1 45%; max-width: 48%; }
        }
    </style>
</head>
